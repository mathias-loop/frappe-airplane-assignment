<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f5f7;
            color: #333;
        }
        
        /* Card Styling */
        .shop-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
            margin: 40px auto;
            overflow: hidden;
            border: 1px solid #e1e4e8;
        }

        .card-header {
            background-color: #f8f9fa;
            padding: 20px 25px;
            border-bottom: 1px solid #e1e4e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.25rem;
            color: #1a202c;
        }

        /* Status Badge */
        .status-badge {
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            /* Default gray */
            background-color: #e2e8f0; 
            color: #4a5568;
        }
        
        /* Dynamic color for status (optional logic) */
        .status-Available { background-color: #c6f6d5; color: #22543d; }
        .status-Leased { background-color: #fed7d7; color: #822727; }

        .card-content {
            padding: 25px;
        }

        /* Data Rows */
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px dashed #edf2f7;
            padding-bottom: 12px;
        }
        
        .data-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .label { color: #718096; font-size: 0.95rem; }
        .value { font-weight: 600; color: #2d3748; }

        .card-footer {
            padding: 20px 25px;
            background-color: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e1e4e8;
        }

        /* Buttons */
        .btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s;
            text-align: center;
            flex: 1; /* Makes buttons equal width */
        }

        .btn-primary {
            background-color: #3182ce;
            color: white;
        }
        .btn-primary:hover { background-color: #2b6cb0; }

        .btn-secondary {
            background-color: #edf2f7;
            color: #4a5568;
        }
        .btn-secondary:hover { background-color: #e2e8f0; }

    </style>
</head>

<body>
    <main>
        <article class="shop-card">
            <header class="card-header">
                <h3>🛍️ {{ doc.shop_name }}</h3>
                <span class="status-badge status-{{ doc.status }}">
                    {{ doc.status }}
                </span>
            </header>
            
            <div class="card-content">
                <div class="data-row">
                    <span class="label">Airport Location</span>
                    <span class="value">{{ doc.airport }}</span>
                </div>
                <div class="data-row">
                    <span class="label">Monthly Rent</span>
                    <span class="value">{{ doc.get_formatted("rent_amount") or doc.rent_amount }}</span>
                </div>
                <div class="data-row">
                    <span class="label">Floor Area</span>
                    <span class="value">{{ doc.area }} sq ft</span>
                </div>
            </div>

            <footer class="card-footer">
                 <a href="/shops" class="btn btn-secondary">
                    ← Back
                </a>
                
                {% if doc.status == 'Available' %}
                <a href="/shop-request/new?shop={{ doc.name }}" class="btn btn-primary">
                    Request Lease
                </a>
                {% else %}
                 <a href="#" class="btn btn-secondary" style="opacity: 0.5; cursor: not-allowed;">
                    Unavailable
                </a>
                {% endif %}
            </footer>
        </article>
    </main>
</body>
